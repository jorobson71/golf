<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jo & Pete's Golf Pro</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-red: #ff4d4d;
            --accent-green: #4ade80;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Famous Red Bar */
        .header-bar {
            width: 100%;
            background-color: var(--accent-red);
            padding: 20px 0;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .setup-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .label {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* Large Inputs for Pete */
        input {
            width: 100%;
            padding: 15px;
            font-size: 1.8rem;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Wind Buttons Styling */
        .wind-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .wind-btn {
            background: #444;
            border: 2px solid #666;
            color: white;
            padding: 15px 5px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .wind-btn.active {
            background: var(--accent-green);
            border-color: white;
            color: black;
        }

        /* Club Button Grid */
        .club-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        .club-btn {
            padding: 25px 10px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        /* Distinct Colors for Clubs */
        .driver { background: #e63946; } /* Red */
        .wood { background: #f4a261; }   /* Orange */
        .hybrid { background: #e9c46a; } /* Yellow */
        .iron { background: #2a9d8f; }   /* Teal */
        .wedge { background: #457b9d; }  /* Blue */
        .putter { background: #8d99ae; } /* Grey */

        .result {
            margin-top: 30px;
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
            color: var(--accent-green);
            min-height: 2.5rem;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>GOLF PRO V5</h1>
    </div>

    <div class="setup-section">
        <span class="label">DISTANCE (Yards)</span>
        <input type="number" id="yards" placeholder="Enter Yards" inputmode="numeric">

        <span class="label">WIND DIRECTION</span>
        <div class="wind-grid">
            <button class="wind-btn" onclick="setWind('Tail', this)">TAIL</button>
            <button class="wind-btn" onclick="setWind('None', this)">NONE</button>
            <button class="wind-btn" onclick="setWind('Head', this)">HEAD</button>
        </div>
    </div>

    <div class="club-grid">
        <button class="club-btn driver" onclick="calculate('Driver')">DRIVER</button>
        <button class="club-btn wood" onclick="calculate('3-Wood')">3-WOOD</button>
        <button class="club-btn hybrid" onclick="calculate('Hybrid')">HYBRID</button>
        <button class="club-btn iron" onclick="calculate('7-Iron')">7-IRON</button>
        <button class="club-btn wedge" onclick="calculate('Wedge')">WEDGE</button>
        <button class="club-btn putter" onclick="calculate('Putter')">PUTTER</button>
    </div>

    <div class="result" id="output"></div>

    <script>
        let currentWind = 'None';

        function setWind(direction, btn) {
            currentWind = direction;
            // Clear all active buttons
            document.querySelectorAll('.wind-btn').forEach(b => b.classList.remove('active'));
            // Set current button to active
            btn.classList.add('active');
        }

        function calculate(club) {
            const yards = document.getElementById('yards').value;
            const output = document.getElementById('output');
            
            if (!yards) {
                output.innerHTML = "Enter yards first!";
                return;
            }

            let adjustment = "";
            if (currentWind === 'Head') adjustment = " (Aim +10%)";
            if (currentWind === 'Tail') adjustment = " (Aim -10%)";

            output.innerHTML = club + " for " + yards + "y" + adjustment;
        }
    </script>
</body>
</html>
