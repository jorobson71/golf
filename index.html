<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLF PRO V5</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-red: #ff4d4d;
            --accent-green: #4ade80;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation; /* Prevents double-tap zoom delay */
        }

        .header-bar {
            width: 100%;
            background-color: var(--accent-red);
            padding: 20px 0;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 2.2rem; }

        .setup-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .label { font-size: 1.4rem; display: block; margin-bottom: 10px; font-weight: bold; }

        input {
            width: 100%;
            padding: 15px;
            font-size: 1.8rem;
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .wind-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Fixed buttons for Mobile */
        .wind-btn, .club-btn {
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .wind-btn {
            background: #444;
            border: 2px solid #666;
            color: white;
            padding: 15px 5px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .wind-btn.active { background: var(--accent-green); color: black; border-color: white; }

        .club-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        .club-btn {
            padding: 25px 10px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            color: white;
        }

        .driver { background: #e63946; }
        .wood { background: #f4a261; }
        .hybrid { background: #e9c46a; }
        .iron { background: #2a9d8f; }
        .wedge { background: #457b9d; }
        .putter { background: #8d99ae; }

        .result {
            margin-top: 30px;
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
            color: var(--accent-green);
            min-height: 2.5rem;
            padding: 10px;
            border: 1px dashed #444;
            width: 90%;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>GOLF PRO V5</h1>
    </div>

    <div class="setup-section">
        <span class="label">DISTANCE (Yards)</span>
        <input type="number" id="yards" placeholder="Tap to Enter" inputmode="numeric">

        <span class="label">WIND DIRECTION</span>
        <div class="wind-grid">
            <button class="wind-btn" onclick="setWind('Tail', this)">TAIL</button>
            <button class="wind-btn active" onclick="setWind('None', this)">NONE</button>
            <button class="wind-btn" onclick="setWind('Head', this)">HEAD</button>
        </div>
    </div>

    <div class="club-grid">
        <button class="club-btn driver" onclick="calculate('Driver')">DRIVER</button>
        <button class="club-btn wood" onclick="calculate('3-Wood')">3-WOOD</button>
        <button class="club-btn hybrid" onclick="calculate('Hybrid')">HYBRID</button>
        <button class="club-btn iron" onclick="calculate('7-Iron')">7-IRON</button>
        <button class="club-btn wedge" onclick="calculate('Wedge')">WEDGE</button>
        <button class="club-btn putter" onclick="calculate('Putter')">PUTTER</button>
    </div>

    <div class="result" id="output">Result will appear here</div>

    <script>
        let currentWind = 'None';

        function setWind(direction, btn) {
            currentWind = direction;
            document.querySelectorAll('.wind-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Re-calculate if yards are already in
            if(document.getElementById('yards').value) {
                const currentClub = document.getElementById('output').innerText.split(' ')[0];
                if(currentClub !== "Result" && currentClub !== "Enter") calculate(currentClub);
            }
        }

        function calculate(club) {
            const yards = document.getElementById('yards').value;
            const output = document.getElementById('output');
